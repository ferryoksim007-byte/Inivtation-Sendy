<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>RSVP — SENN Sweet Seventeen</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
<style>
  /* Styling grid pilihan menu biar rapi & responsif di HP */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 0.8rem;
    margin-top: 0.8rem;
  }
  
  /* Base Style & Animasi Transisi */
  .menu-option {
    padding: 0.8rem 0.5rem;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.8); /* Warna teks sedikit redup saat belum dipilih */
    text-align: center;
    cursor: pointer;
    font-size: 0.9rem;
    /* Ini rahasia animasi smooth-nya bro */
    transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
    user-select: none;
    backdrop-filter: blur(5px);
  }

  /* Animasi saat tombol ditahan/di-hover (opsional untuk laptop/sebelum disentuh) */
  .menu-option:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
    color: #fff;
  }

  /* Animasi saat Menu dipilih (Active) - Efek Pop-up & Glow */
  .menu-option.active {
    background: rgba(255, 255, 255, 0.25);
    border-color: #fff;
    color: #fff;
    /* Shadow ini bikin efek glowing kayak lampu */
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15), 0 0 15px rgba(255, 255, 255, 0.4);
    font-weight: 700;
    /* Efek tombol membesar dan naik ke atas */
    transform: translateY(-4px) scale(1.03); 
  }
</style>
</head>
<body>

  <canvas id="wave-canvas" class="bg-canvas-layer"></canvas>
  <div id="bubble-layer" class="bg-canvas-layer"></div>
  <div id="sparkle-layer" class="bg-canvas-layer"></div>

  <div class="nav-back" data-target="dresscode.html" aria-label="Go back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <div class="flow-progress">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot active"></span><span class="dot"></span>
  </div>

  <main class="stage">
    <div class="content-layer">
      <div class="glass-card">
        <div class="text-center">
          <span class="eyebrow">RSVP</span>
          <h2 class="page-title" style="font-size:clamp(2rem,5vw,2.8rem); margin-top:0.5rem;">Can u come to my<br>17th birthday??</h2>
        </div>

        <form id="rsvp-form" class="rsvp-form">
          <div class="form-group">
            <label for="rsvp-name">Full Name</label>
            <input type="text" id="rsvp-name" name="name" placeholder="Your full name" autocomplete="name" required>
          </div>

          <div class="form-group">
            <label for="rsvp-phone">Phone Number</label>
            <input type="tel" id="rsvp-phone" name="phone" placeholder="e.g. 0812xxxxxxx" autocomplete="tel" required>
          </div>

          <div class="form-group">
            <label>Can u come to my 17th birthday??</label>
            <div class="rsvp-options">
              <div class="rsvp-option" data-value="coming">OFCC &gt;&lt;</div>
              <div class="rsvp-option" data-value="not_coming">NUHH :(</div>
            </div>
          </div>

          <!-- FITUR BARU: PILIHAN MENU MAKANAN -->
          <div class="form-group" id="menu-section">
            <label>Choose Your Meal 🍱</label>
            <div class="menu-grid">
              <div class="menu-option active" data-value="Beef Teriyaki Set">Beef Teriyaki 🥩</div>
              <div class="menu-option" data-value="Chicken Katsu Set">Chicken Katsu 🍗</div>
              <div class="menu-option" data-value="Vegetarian Pasta">Veggie Pasta 🍝</div>
            </div>
          </div>

          <div class="form-group">
            <label for="rsvp-message">Message</label>
            <textarea id="rsvp-message" name="message" placeholder="Leave a sweet message for Senn..."></textarea>
          </div>

          <p id="rsvp-error" class="form-error"></p>

          <button type="submit" id="rsvp-submit" class="btn btn-primary">SEND 💌</button>
        </form>
      </div>
    </div>
  </main>

  <!-- RSVP success popup -->
  <div class="popup-overlay" id="rsvp-popup">
    <div class="glass-card popup-card">
      <div class="popup-icon">🎉</div>
      <h3>Thank you!!</h3>
      <p class="subtitle">Can't wait to celebrate with you!</p>
      <button id="popup-continue" class="btn btn-primary mt-2">Continue</button>
    </div>
  </div>

  <audio id="bg-audio" loop preload="none">
    <source src="assets/audio/ambient-ocean-piano.mp3" type="audio/mpeg">
  </audio>
  <button id="music-toggle" class="music-toggle" aria-label="Toggle background music">
    <div class="music-bars"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/rsvp.js"></script>
  <script>
    // 1. Logika Kehadiran (Yes / No)
    const rsvpOptions = document.querySelectorAll('.rsvp-option');
    let selectedAttendance = "💖 OFCC ><";

    if (rsvpOptions.length > 0) {
      rsvpOptions[0].classList.add('active');
    }

    rsvpOptions.forEach(option => {
      option.addEventListener('click', () => {
        rsvpOptions.forEach(opt => opt.classList.remove('active'));
        option.classList.add('active');
        
        const attendanceValue = option.getAttribute('data-value');
        if (attendanceValue === 'coming') {
          selectedAttendance = "💖 OFCC ><";
          document.getElementById('menu-section').style.display = 'block'; // Tampilkan menu kalau hadir
        } else {
          selectedAttendance = "😢 NUHH :(";
          document.getElementById('menu-section').style.display = 'none'; // Sembunyikan menu kalau ga hadir
        }
      });
    });

    // 2. Logika Pilihan Menu Makanan
    const menuOptions = document.querySelectorAll('.menu-option');
    let selectedMenu = "Beef Teriyaki 🥩"; // Default menu awal

    menuOptions.forEach(option => {
      option.addEventListener('click', () => {
        menuOptions.forEach(opt => opt.classList.remove('active'));
        option.classList.add('active');
        selectedMenu = option.getAttribute('data-value');
      });
    });

    // 3. Tombol Back Navigasi
    const backBtn = document.querySelector('.nav-back');
    if (backBtn) {
      backBtn.addEventListener('click', () => {
        const targetPage = backBtn.getAttribute('data-target');
        if (targetPage) window.location.href = targetPage;
        else window.history.back();
      });
    }

    // 4. Logika Kirim Data ke Google Sheets
    const rsvpForm = document.getElementById('rsvp-form');
    const rsvpSubmitBtn = document.getElementById('rsvp-submit');
    const rsvpPopup = document.getElementById('rsvp-popup');
    const closePopupBtn = document.getElementById('popup-continue');

    if (rsvpForm) {
      rsvpForm.addEventListener('submit', function(event) {
        event.preventDefault();

        if (rsvpSubmitBtn) {
          rsvpSubmitBtn.innerText = "SENDING... ✨";
          rsvpSubmitBtn.disabled = true;
        }

        const guestName = document.getElementById('rsvp-name').value;
        const guestPhone = document.getElementById('rsvp-phone').value;
        const guestMessage = document.getElementById('rsvp-message').value || "-";

        const googleSheetsEndpoint = "https://script.google.com/macros/s/AKfycbxncsqZkra1hCN3w3Rp2h5DqnAdx0846NCDNPRz0n7OP-V-BDfNLT8OPfytEUY6I84G/exec"; 

        // PAYLOAD TERBARU (Ditambah data menu)
        const payloadData = {
          name: guestName,
          phone: guestPhone,
          attendance: selectedAttendance,
          menu: selectedAttendance.includes('NUHH') ? "-" : selectedMenu, // Kalau ga dateng, menu otomatis '-'
          message: guestMessage
        };

        fetch(googleSheetsEndpoint, {
          method: 'POST',
          mode: 'no-cors',
          cache: 'no-cache',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payloadData)
        })
        .then(() => {
          if (rsvpSubmitBtn) {
            rsvpSubmitBtn.innerText = "SEND 💌";
            rsvpSubmitBtn.disabled = false;
          }

          // Reset Form & Opsi ke Default
          rsvpForm.reset();
          
          rsvpOptions.forEach(opt => opt.classList.remove('active'));
          if (rsvpOptions.length > 0) rsvpOptions[0].classList.add('active');
          selectedAttendance = "💖 OFCC ><";

          menuOptions.forEach(opt => opt.classList.remove('active'));
          if (menuOptions.length > 0) menuOptions[0].classList.add('active');
          selectedMenu = "Beef Teriyaki 🥩";
          document.getElementById('menu-section').style.display = 'block';

          // Tampilkan Popup Sukses
          if (rsvpPopup) {
            rsvpPopup.classList.add('active');
            rsvpPopup.style.display = 'flex'; 
          }

          if (typeof confetti === 'function') {
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.5 } });
          }
        })
        .catch(err => {
          console.error("Gagal mengirim data:", err);
          alert("Oops! Terjadi gangguan jaringan. Silakan coba lagi.");
          if (rsvpSubmitBtn) {
            rsvpSubmitBtn.innerText = "SEND 💌";
            rsvpSubmitBtn.disabled = false;
          }
        });
      });
    }

    if (closePopupBtn) {
      closePopupBtn.addEventListener('click', () => {
        if (rsvpPopup) {
          rsvpPopup.classList.remove('active');
          rsvpPopup.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
